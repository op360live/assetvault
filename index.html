<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Hub &mdash; Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ── THEMES ── */
[data-theme="light"]{
  --page-bg:#f0f4f8;
  --topbar-bg:#ffffff;
  --card-bg:#ffffff;
  --card-shadow:0 1px 3px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);
  --border:#e2e8f0;
  --text:#0f172a;
  --text2:#64748b;
  --text3:#94a3b8;
  --accent:#1d4ed8;
  --accent-soft:rgba(29,78,216,.1);
  --accent-glow:rgba(29,78,216,.15);
  --search-bg:#f8fafc;
  --hover-bg:#f8fafc;
  --active-nav-bg:rgba(29,78,216,.08);
  --green:#3db48c;--green-bg:rgba(61,180,140,.12);
  --blue:#2563eb;--blue-bg:rgba(37,99,235,.12);
  --amber:#d4874a;--amber-bg:rgba(212,135,74,.12);
  --red:#d95a6a;--red-bg:rgba(217,90,106,.10);
  --radius:6px;--radius-lg:10px;--radius-xl:14px;
  --topbar-h:60px;
}
[data-theme="dark"]{
  --page-bg:#0f172a;
  --topbar-bg:#1e293b;
  --card-bg:#1e293b;
  --card-shadow:0 2px 12px rgba(0,0,0,.4);
  --border:rgba(255,255,255,.08);
  --text:#e2e8f0;
  --text2:#94a3b8;
  --text3:#475569;
  --accent:#60a5fa;
  --accent-soft:rgba(96,165,250,.12);
  --accent-glow:rgba(96,165,250,.2);
  --search-bg:rgba(255,255,255,.04);
  --hover-bg:rgba(255,255,255,.05);
  --active-nav-bg:rgba(96,165,250,.12);
  --green:#5fd4a8;--green-bg:rgba(95,212,168,.12);
  --blue:#60a5fa;--blue-bg:rgba(96,165,250,.12);
  --amber:#f0b070;--amber-bg:rgba(240,176,112,.12);
  --red:#f08090;--red-bg:rgba(240,128,144,.10);
  --radius:6px;--radius-lg:10px;--radius-xl:14px;
  --topbar-h:60px;
}

html{scroll-behavior:smooth}
body{
  font-family:'Inter',-apple-system,'Helvetica Neue',sans-serif;
  background:var(--page-bg);min-height:100vh;color:var(--text);
  font-size:14px;line-height:1.5;transition:background .25s,color .25s;
}

/* ── TOPBAR ── */
.topbar{
  position:sticky;top:0;z-index:100;
  height:var(--topbar-h);
  background:var(--topbar-bg);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;transition:background .25s;
}
.topbar-brand{
  display:flex;align-items:center;gap:10px;
  font-weight:700;font-size:15.5px;color:var(--text);text-decoration:none;flex-shrink:0;
}
.topbar-nav{display:flex;align-items:center;gap:2px}
.topbar-nav a{
  display:flex;align-items:center;gap:7px;
  padding:7px 13px;border-radius:var(--radius);
  font-size:13px;font-weight:500;color:var(--text2);
  text-decoration:none;transition:background .13s,color .13s;
}
.topbar-nav a:hover{background:var(--hover-bg);color:var(--text)}
.topbar-nav a.active{background:var(--active-nav-bg);color:var(--accent);font-weight:600}
.topbar-right{display:flex;align-items:center;gap:8px}
#themeToggle{
  display:flex;align-items:center;justify-content:center;
  width:34px;height:34px;border-radius:50%;
  border:1px solid var(--border);background:transparent;
  color:var(--text2);cursor:pointer;transition:background .13s;
}
#themeToggle:hover{background:var(--hover-bg)}

/* ── PAGE CONTENT ── */
.page-content{max-width:760px;margin:0 auto;padding:32px 24px 80px;width:100%}
.page-footer{
  padding:10px 0 0;
  font-size:12px;color:var(--text3);
}

/* ── WELCOME CARD ── */
.welcome-card{
  background:var(--accent);
  border-radius:var(--radius-lg);
  padding:22px 26px;margin-bottom:20px;
  color:#fff;position:relative;overflow:hidden;
}
.welcome-card::before{
  content:'';position:absolute;top:-30px;right:-20px;
  width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.08);
}
.welcome-card::after{
  content:'';position:absolute;top:20px;right:80px;
  width:70px;height:70px;border-radius:50%;background:rgba(255,255,255,.05);
}
.welcome-title{font-size:15px;font-weight:700;margin-bottom:4px;position:relative}
.welcome-sub{font-size:12.5px;opacity:.85;position:relative;max-width:480px}

/* ── QUICK LINKS ── */
.ql-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.ql-card{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--radius-lg);padding:16px 18px;
  box-shadow:var(--card-shadow);
  display:flex;align-items:center;gap:14px;
  text-decoration:none;transition:border-color .15s,box-shadow .15s;
}
.ql-card:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow),var(--card-shadow)}
.ql-icon{
  width:40px;height:40px;border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.ql-label{font-size:11.5px;color:var(--text3);margin-bottom:2px}
.ql-name{font-size:13.5px;font-weight:600;color:var(--text)}
.ql-arrow{margin-left:auto;color:var(--text3);flex-shrink:0;transition:transform .15s}
.ql-card:hover .ql-arrow{transform:translateX(3px);color:var(--accent)}

/* ── CARD ── */
.card{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--radius-lg);box-shadow:var(--card-shadow);
  margin-bottom:20px;overflow:hidden;
}
.card-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 20px;border-bottom:1px solid var(--border);
}
.card-title{
  display:flex;align-items:center;gap:8px;
  font-size:13.5px;font-weight:600;color:var(--text);
}
.card-body{padding:18px 20px}

/* ── SEARCH ── */
.search-row{display:flex;gap:10px;align-items:center}
.search-input-wrap{position:relative;flex:1}
.search-input-wrap svg{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-input{
  width:100%;padding:10px 14px 10px 38px;
  background:var(--search-bg);border:1px solid var(--border);
  border-radius:var(--radius);font-size:14px;
  color:var(--text);font-family:inherit;outline:none;
  transition:border-color .15s,box-shadow .15s;
}
.search-input::placeholder{color:var(--text3)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.table-select{
  padding:10px 13px;background:var(--search-bg);
  border:1px solid var(--border);border-radius:var(--radius);
  font-size:13px;color:var(--text2);font-family:inherit;
  outline:none;cursor:pointer;min-width:148px;transition:border-color .15s;
}
.table-select:focus{border-color:var(--accent)}
.search-btn{
  display:flex;align-items:center;gap:7px;
  padding:10px 20px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--radius);
  font-size:13.5px;font-weight:600;font-family:inherit;
  cursor:pointer;white-space:nowrap;transition:opacity .15s,transform .1s;
}
.search-btn:hover{opacity:.9}
.search-btn:active{transform:scale(.98)}
.search-btn:disabled{opacity:.6;cursor:not-allowed}
.search-footer{
  display:flex;align-items:center;justify-content:space-between;
  margin-top:13px;padding-top:13px;border-top:1px solid var(--border);
}
.search-status{font-size:12.5px;color:var(--text3);display:flex;align-items:center;gap:6px}
.search-hint{font-size:12px;color:var(--text3)}
.search-hint kbd{
  display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;
  border:1px solid var(--border);background:var(--search-bg);
  font-size:11px;font-family:inherit;color:var(--text3);
}

/* ── RESULTS ── */
#resultsArea{display:none}
#resultsArea.visible{display:block}
.results-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.results-title{font-size:13.5px;font-weight:600}
.results-count{
  font-size:12px;color:var(--text3);background:var(--search-bg);
  padding:3px 10px;border-radius:999px;border:1px solid var(--border);
}
.results-grid{display:flex;flex-direction:column;gap:8px}
.result-group{
  background:var(--card-bg);border:1px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--card-shadow);
}
.result-group-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px;border-bottom:1px solid var(--border);
  background:var(--search-bg);
}
.result-group-title{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600}
.result-group-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center}
.result-group-count{font-size:11px;font-weight:500;padding:2px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent)}
.result-records{padding:6px;display:flex;flex-direction:column;gap:2px}
.rec-card{
  padding:7px 10px;border-radius:var(--radius);
  border:1px solid transparent;background:transparent;
  transition:background .12s,border-color .12s;
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
}
.rec-card:hover{background:var(--search-bg);border-color:var(--border)}
.rec-fields{display:flex;flex-wrap:wrap;gap:4px;flex:1;min-width:0}
.rec-field{display:inline-flex;align-items:center;gap:3px;font-size:11.5px}
.rec-field-key{color:var(--text3);font-weight:500}
.rec-field-key::after{content:':'}
.rec-field-val{color:var(--text);font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rec-field+.rec-field::before{content:'·';color:var(--text3);margin-right:3px}
.rec-raw-toggle{
  display:inline-flex;align-items:center;gap:4px;flex-shrink:0;
  font-size:11px;color:var(--text3);cursor:pointer;
  border:none;background:none;font-family:inherit;padding:0;white-space:nowrap;
}
.rec-raw-toggle:hover{color:var(--accent)}
.rec-raw-pre{
  display:none;width:100%;margin-top:6px;padding:8px 10px;
  background:var(--page-bg);border-radius:var(--radius);
  font-size:11px;font-family:'SF Mono','Fira Code',monospace;
  color:var(--text2);overflow-x:auto;max-height:160px;overflow-y:auto;
  border:1px solid var(--border);white-space:pre-wrap;word-break:break-all;
}
.rec-raw-pre.open{display:block}
.no-results{text-align:center;padding:48px 20px;color:var(--text3)}
.no-results-icon{display:flex;align-items:center;justify-content:center;margin-bottom:12px;color:var(--text3)}
.no-results p{font-size:14px}
.spinner{
  display:inline-block;width:13px;height:13px;
  border:2px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.err-card{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:var(--red-bg);border:1px solid var(--red);
  border-radius:var(--radius-lg);color:var(--red);font-size:13px;
}

/* ── RESPONSIVE ── */
@media(max-width:900px){.ql-row{grid-template-columns:1fr 1fr}}
@media(max-width:760px){
  .topbar-nav{display:none}
  .search-row{flex-wrap:wrap}
  .table-select{min-width:0;flex:1}
  .search-btn{width:100%;justify-content:center}
  .page-content{padding:20px 16px 60px}
}
@media(max-width:520px){.ql-row{grid-template-columns:1fr}}
</style>

/* TURSO */
async function tursoExec(sql,args=[]){
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),9000);
  try{
    const res=await fetch(TURSO_URL+'/v2/pipeline',{
      method:'POST',signal:ctrl.signal,
      headers:{'Authorization':'Bearer '+TURSO_TOKEN,'Content-Type':'application/json'},
      body:JSON.stringify({requests:[
        {type:'execute',stmt:{sql,args:args.map(v=>v===null?{type:'null'}:{type:'text',value:String(v)})}},
        {type:'close'}
      ]})
    });
    if(!res.ok)throw new Error('HTTP '+res.status);
    const json=await res.json();
    const r=json.results?.[0];
    if(r?.type==='error')throw new Error(r.error?.message||'Query error');
    return r?.response?.result||null;
  }catch(err){return{error:err.message}}finally{clearTimeout(timer)}
}

/* HELPERS */
function escapeHtml(str){return String(str).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function escapeLike(t){return t.replace(/([%_!])/g,'!$1')}
function tryParseJson(v){if(!v)return null;try{return JSON.parse(v)}catch(e){return null}}
function renderFields(data,preferKeys){
  if(!data||typeof data!=='object')return'';
  const shown=[];
  const allKeys=[...preferKeys,...Object.keys(data).filter(k=>!preferKeys.includes(k))];
  for(const k of allKeys){
    if(!(k in data))continue;
    const v=data[k];
    if(v===null||v===undefined||v==='')continue;
    const val=typeof v==='object'?JSON.stringify(v):String(v);
    shown.push('<span class="rec-field"><span class="rec-field-key">'+escapeHtml(k)+'</span><span class="rec-field-val" title="'+escapeHtml(val)+'">'+escapeHtml(val)+'</span></span>');
    if(shown.length>=6)break;
  }
  return shown.join('');
}

/* RENDER */
function buildRecordCard(row,meta){
  const rawData=row[1]?.value??row[0]?.value??'';
  const parsed=tryParseJson(rawData);
  const fields=parsed?renderFields(parsed,meta.keys):'';
  const prettyRaw=parsed?JSON.stringify(parsed,null,2):rawData;
  const id='raw_'+Math.random().toString(36).slice(2);
  return '<div class="rec-card">'
    +(fields?'<div class="rec-fields">'+fields+'</div>':'')
    +'</div>';
}

function buildGroup(table,rows){
  const meta=TABLE_META[table]||{icon:SVG('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>'),color:'rgba(148,163,184,.12)',label:table,keys:[]};
  return '<div class="result-group">'
    +'<div class="result-group-header">'
    +'<div class="result-group-title"><div class="result-group-icon" style="background:'+meta.color+'">'+meta.icon+'</div>'+escapeHtml(meta.label)+'</div>'
    +'<span class="result-group-count">'+rows.length+' result'+(rows.length!==1?'s':'')+'</span>'
    +'</div>'
    +'<div class="result-records">'+rows.map(r=>buildRecordCard(r,meta)).join('')+'</div>'
    +'</div>';
}

/* SEARCH */
const searchInput=document.getElementById('searchInput');
const tableSelect=document.getElementById('tableSelect');
const searchBtn=document.getElementById('searchBtn');
const statusEl=document.getElementById('statusText');
const resultsArea=document.getElementById('resultsArea');
const resultsGrid=document.getElementById('resultsGrid');
const resultsCount=document.getElementById('resultsCount');

function setStatus(msg,loading=false){
  statusEl.innerHTML=loading?'<span class="spinner"></span> '+escapeHtml(msg):escapeHtml(msg);
  searchBtn.disabled=loading;
}

async function runSearch(){
  const term=searchInput.value.trim();
  if(!term){setStatus('Type a keyword first.');return}
  const table=tableSelect.value;
  const tables=table==='all'?TABLES:[table];
  setStatus('Searching\u2026',true);
  resultsArea.classList.remove('visible');
  resultsGrid.innerHTML='';
  const pattern='%'+escapeLike(term.toLowerCase())+'%';
  const queries=tables.map(t=>
    tursoExec('SELECT rowid, data FROM '+t+' WHERE LOWER(data) LIKE ? ESCAPE \'!\' LIMIT 50',[pattern])
      .then(result=>({table:t,result}))
  );
  const responses=await Promise.all(queries);
  const parts=[];let total=0;
  for(const{table:t,result}of responses){
    if(!result)continue;
    if(result.error){
      parts.push('<div class="err-card"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> <strong>'+escapeHtml(t)+':</strong> '+escapeHtml(result.error)+'</div>');
      continue;
    }
    const rows=result.rows||[];
    if(!rows.length)continue;
    total+=rows.length;
    parts.push(buildGroup(t,rows));
  }
  resultsGrid.innerHTML=parts.length?parts.join(''):'<div class="no-results"><div class="no-results-icon"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></div><p>No results for <strong>&ldquo;'+escapeHtml(term)+'&rdquo;</strong>'+(table!=='all'?' in '+escapeHtml(table):'')+' &mdash; try a different search term.</p></div>';
  resultsArea.classList.add('visible');
  resultsCount.textContent=total+' record'+(total!==1?'s':'');
  setStatus(total?'Found '+total+' matching record'+(total!==1?'s':'')+'.' :'No results found.');
}

searchBtn.addEventListener('click',runSearch);
searchInput.addEventListener('keydown',e=>{if(e.key==='Enter')runSearch()});
</script>
