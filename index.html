<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Site Maintenance · AssetVault</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231d4ed8'/%3E%3Cpath d='M9 20l11-11 3 3-11 11H9v-3z' fill='white'/%3E%3Cpath d='M19 8l5 5' stroke='%23bfdbfe' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --soft: #94a3b8;
      --border: #e2e8f0;
      --accent: #1d4ed8;
      --accent-dark: #172a4f;
      --accent-soft: rgba(29, 78, 216, .1);
      --shadow: 0 24px 70px rgba(15, 23, 42, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    .maintenance {
      width: min(780px, 100%);
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .topbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
      font-weight: 800;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #fff;
    }

    .brand small {
      display: block;
      margin-top: 2px;
      color: var(--soft);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .status::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(29, 78, 216, .12);
    }

    .body {
      padding: 46px 44px 40px;
      text-align: center;
    }

    .icon {
      width: 74px;
      height: 74px;
      margin: 0 auto 22px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: var(--accent-soft);
      color: var(--accent-dark);
    }

    h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .lead {
      width: min(560px, 100%);
      margin: 16px auto 0;
      color: var(--muted);
      font-size: 16px;
    }

    .notice {
      width: min(560px, 100%);
      margin: 28px auto 0;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface-soft);
      color: var(--muted);
      text-align: left;
    }

    .notice strong {
      color: var(--text);
    }

    .footer {
      padding: 14px 24px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      background: var(--surface-soft);
      color: var(--soft);
      font-size: 12px;
      font-weight: 700;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      .topbar,
      .footer {
        padding-inline: 16px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
        padding-block: 14px;
      }

      .body {
        padding: 34px 20px 30px;
      }

      .lead {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <main class="maintenance" aria-labelledby="maintenanceTitle">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 32 32" fill="none">
            <circle cx="16" cy="16" r="8" stroke="currentColor" stroke-width="2"/>
            <path d="M16 8c-2 2.5-3 5-3 8s1 5.5 3 8M16 8c2 2.5 3 5 3 8s-1 5.5-3 8M8 16h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </span>
        <span>IT Hub<small>AssetVault</small></span>
      </div>
      <span class="status">Maintenance in progress</span>
    </header>

    <section class="body">
      <div class="icon" aria-hidden="true">
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L4 17l3 3 5.3-5.3a4 4 0 0 0 5.4-5.4"/>
          <path d="M15 5l4 4"/>
          <path d="M17 3l4 4"/>
        </svg>
      </div>
      <h1 id="maintenanceTitle">We’ll be back shortly.</h1>
      <p class="lead">AssetVault is temporarily unavailable while we apply updates and perform maintenance.</p>
      <div class="notice">
        <strong>No action is needed from your side.</strong> Please check again later. Thank you for your patience.
      </div>
    </section>

    <footer class="footer">
      <span>IT Hub &copy; 2026 AssetVault</span>
      <span>Temporary maintenance page</span>
    </footer>
  </main>
</body>
</html>
