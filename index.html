<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="2; url=https://workspacehub.page.gd/">
  <title>Redirection Site</title>
  <link rel="canonical" href="https://workspacehub.page.gd/">
  <style>
    :root {
      --bg: #f0f4f8;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #1d4ed8;
      --accent-soft: rgba(29, 78, 216, .1);
      --shadow: 0 24px 70px rgba(15, 23, 42, .12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    .redirect-card {
      width: min(520px, 100%);
      padding: 34px;
      border: 1px solid var(--border);
      border-radius: 18px;
      background: var(--card);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .mark {
      width: 54px;
      height: 54px;
      margin: 0 auto 18px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #fff;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin: 12px 0 0;
      color: var(--muted);
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      margin-top: 24px;
      padding: 0 18px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      text-decoration: none;
    }

    .hint {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--accent-soft);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
  </style>
  <script>
    window.setTimeout(() => {
      window.location.replace("https://workspacehub.page.gd/");
    }, 700);
  </script>
</head>
<body>
  <main class="redirect-card" aria-labelledby="redirectTitle">
    <div class="mark" aria-hidden="true">
      <svg width="24" height="24" viewBox="0 0 32 32" fill="none">
        <circle cx="16" cy="16" r="8" stroke="currentColor" stroke-width="2"/>
        <path d="M16 8c-2 2.5-3 5-3 8s1 5.5 3 8M16 8c2 2.5 3 5 3 8s-1 5.5-3 8M8 16h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
    <h1 id="redirectTitle">AssetVault has moved.</h1>
    <p>Redirecting you to the new AssetVault domain.</p>
    <a href="https://workspacehub.page.gd/">Go to Workspace Hub</a>
    <div class="hint">New site: https://workspacehub.page.gd/</div>
  </main>
</body>
</html>
